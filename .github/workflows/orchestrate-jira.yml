name: Orchestrate Jira

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (örn: release/v1.4)"
        required: true
        type: string
      transition_to:
        description: "Geçilecek Jira durumu"
        required: true
        type: choice
        options:
          - WAITING QA
          - WAITING TEST DEPLOY
          - WAITING ACCEPTANCE
          - DONE
      comment:
        description: "Jira issue'larına eklenecek yorum (opsiyonel)"
        required: false
        type: string

jobs:
  jira-transition:
    name: Jira durum geçişi
    runs-on: self-hosted

    steps:
      # 1. Onceki tag'i bul
      - name: Önceki tag'i bul
        id: prev-tag
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:RELEASE_PAT"
            Accept        = "application/vnd.github+json"
          }

          $currentTag = "${{ inputs.tag }}"

          # Backend reposundaki tum release taglerini al
          $tagsUrl  = "https://api.github.com/repos/${{ vars.BACKEND_REPO }}/git/refs/tags"
          try {
            $response = Invoke-RestMethod -Uri $tagsUrl -Headers $headers -Method GET
          } catch {
            $response = @()
          }

          $tagPattern = "^refs/tags/release/v(\d+)\.(\d+)(?:\.(\d+))?$"
          $releaseTags = @(
            $response | Where-Object { $_.ref -match $tagPattern } |
            ForEach-Object {
              $null = $_.ref -match $tagPattern
              [PSCustomObject]@{
                Ref   = $_.ref -replace "refs/tags/", ""
                Major = [int]$Matches[1]
                Minor = [int]$Matches[2]
                Patch = if ($Matches[3]) { [int]$Matches[3] } else { 0 }
              }
            } | Sort-Object Major, Minor, Patch
          )

          $tagRefs = @($releaseTags | Select-Object -ExpandProperty Ref)
          $currentIndex = -1
          for ($i = 0; $i -lt $tagRefs.Count; $i++) {
            if ($tagRefs[$i] -eq $currentTag) {
              $currentIndex = $i
              break
            }
          }

          if ($currentIndex -gt 0) {
            $prevTag = $releaseTags[$currentIndex - 1].Ref
          } else {
            $prevTag = ""
          }

          Write-Host "Mevcut tag : $currentTag"
          Write-Host "Onceki tag : $prevTag"
          echo "PREV_TAG=$prevTag" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 2. Backend commit'lerinden issue key'leri topla
      - name: Issue key'leri topla (backend)
        id: backend-keys
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:RELEASE_PAT"
            Accept        = "application/vnd.github+json"
          }

          $currentTag = "${{ inputs.tag }}"
          $prevTag    = "${{ steps.prev-tag.outputs.PREV_TAG }}"
          $pattern    = "${{ vars.JIRA_PROJECT_KEY }}-\d+"
          $keys       = @()
          $commits    = @()

          if ($prevTag -ne "") {
            # Iki tag arasindaki commitler
            $compareUrl = "https://api.github.com/repos/${{ vars.BACKEND_REPO }}/compare/$prevTag...$currentTag"
            try {
              $result  = Invoke-RestMethod -Uri $compareUrl -Headers $headers
              $commits = $result.commits
              Write-Host "Backend: $prevTag...$currentTag arasinda $($commits.Count) commit bulundu"
            } catch {
              Write-Warning "Compare basarisiz, tum commitler alinıyor: $_"
              $commitsUrl = "https://api.github.com/repos/${{ vars.BACKEND_REPO }}/commits?sha=$currentTag&per_page=50"
              $commits    = Invoke-RestMethod -Uri $commitsUrl -Headers $headers
            }
          } else {
            # Ilk release, tum commitleri al
            $commitsUrl = "https://api.github.com/repos/${{ vars.BACKEND_REPO }}/commits?sha=$currentTag&per_page=50"
            $commits    = Invoke-RestMethod -Uri $commitsUrl -Headers $headers
            Write-Host "Backend: Ilk release, tum commitler aliniyor"
          }

          foreach ($commit in $commits) {
            $msg       = $commit.commit.message
            $foundKeys = [regex]::Matches($msg, $pattern)
            foreach ($m in $foundKeys) {
              if ($keys -notcontains $m.Value) {
                $keys += $m.Value
              }
            }
          }

          $keyList = $keys -join ","
          Write-Host "Backend issue key'leri: $keyList"
          echo "BACKEND_KEYS=$keyList" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 3. Frontend commit'lerinden issue key'leri topla
      - name: Issue key'leri topla (frontend)
        id: frontend-keys
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:RELEASE_PAT"
            Accept        = "application/vnd.github+json"
          }

          $currentTag = "${{ inputs.tag }}"
          $prevTag    = "${{ steps.prev-tag.outputs.PREV_TAG }}"
          $pattern    = "${{ vars.JIRA_PROJECT_KEY }}-\d+"
          $keys       = @()
          $commits    = @()

          if ($prevTag -ne "") {
            $compareUrl = "https://api.github.com/repos/${{ vars.FRONTEND_REPO }}/compare/$prevTag...$currentTag"
            try {
              $result  = Invoke-RestMethod -Uri $compareUrl -Headers $headers
              $commits = $result.commits
              Write-Host "Frontend: $prevTag...$currentTag arasinda $($commits.Count) commit bulundu"
            } catch {
              Write-Warning "Compare basarisiz, tum commitler aliniyor: $_"
              $commitsUrl = "https://api.github.com/repos/${{ vars.FRONTEND_REPO }}/commits?sha=$currentTag&per_page=50"
              $commits    = Invoke-RestMethod -Uri $commitsUrl -Headers $headers
            }
          } else {
            $commitsUrl = "https://api.github.com/repos/${{ vars.FRONTEND_REPO }}/commits?sha=$currentTag&per_page=50"
            $commits    = Invoke-RestMethod -Uri $commitsUrl -Headers $headers
            Write-Host "Frontend: Ilk release, tum commitler aliniyor"
          }

          foreach ($commit in $commits) {
            $msg       = $commit.commit.message
            $foundKeys = [regex]::Matches($msg, $pattern)
            foreach ($m in $foundKeys) {
              if ($keys -notcontains $m.Value) {
                $keys += $m.Value
              }
            }
          }

          $keyList = $keys -join ","
          Write-Host "Frontend issue key'leri: $keyList"
          echo "FRONTEND_KEYS=$keyList" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 4. Key listelerini birlestir
      - name: Key listelerini birleştir
        id: merge-keys
        run: |
          $backendKeys  = "${{ steps.backend-keys.outputs.BACKEND_KEYS }}"  -split "," | Where-Object { $_ -ne "" }
          $frontendKeys = "${{ steps.frontend-keys.outputs.FRONTEND_KEYS }}" -split "," | Where-Object { $_ -ne "" }
          $allKeys      = ($backendKeys + $frontendKeys) | Sort-Object -Unique

          if ($allKeys.Count -eq 0) {
            Write-Warning "Hicbir Jira issue key bulunamadi."
            echo "ALL_KEYS=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $keyList = $allKeys -join ","
          Write-Host "Toplam issue key'ler: $keyList"
          echo "ALL_KEYS=$keyList" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 5. Jira durum gecisi
      - name: Jira durum geçişi yap
        run: |
          if ("${{ steps.merge-keys.outputs.ALL_KEYS }}" -eq "") {
            Write-Warning "Issue key bulunamadigi icin Jira gecisi atlanıyor."
            exit 0
          }

          $b64 = [Convert]::ToBase64String(
            [Text.Encoding]::ASCII.GetBytes(
              "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
            )
          )
          $headers = @{
            Authorization  = "Basic $b64"
            "Content-Type" = "application/json"
            Accept         = "application/json"
          }

          $targetStatus = "${{ inputs.transition_to }}"
          $keys         = "${{ steps.merge-keys.outputs.ALL_KEYS }}" -split ","
          $baseUrl      = "${{ secrets.JIRA_BASE_URL }}"
          $failed       = @()

          foreach ($key in $keys) {
            $key = $key.Trim()
            if ($key -eq "") { continue }
            Write-Host "--- $key isleniyor ---"

            try {
              $transUrl  = "$baseUrl/rest/api/3/issue/$key/transitions"
              $transResp = Invoke-RestMethod -Uri $transUrl -Headers $headers

              Write-Host "Mevcut transition'lar: $($transResp.transitions.name -join ', ')"

              # Buyuk/kucuk harf ve Turkce karakter duyarsiz eslesme
              $transition = $transResp.transitions | Where-Object {
                $_.name.ToUpper() -eq $targetStatus.ToUpper() -or
                ($_.name -replace "[İIıi]","i") -eq ($targetStatus -replace "[İIıi]","i")
              } | Select-Object -First 1

              if (-not $transition) {
                Write-Warning "$key icin '$targetStatus' transition bulunamadi. Issue zaten bu durumda olabilir."
                continue
              }

              $body = @{ transition = @{ id = $transition.id } } | ConvertTo-Json
              Invoke-RestMethod `
                -Uri    $transUrl `
                -Method POST `
                -Headers $headers `
                -Body   $body | Out-Null

              Write-Host "$key gecisi yapildi: $($transition.name)"

            } catch {
              Write-Warning "$key icin gecis basarisiz: $_"
              $failed += $key
            }
          }

          if ($failed.Count -gt 0) {
            Write-Warning "Gecis yapilamayan issue'lar: $($failed -join ', ')"
          }
        shell: powershell

      # 6. Yorum ekle
      - name: Jira issue'larına yorum ekle
        if: inputs.comment != ''
        run: |
          if ("${{ steps.merge-keys.outputs.ALL_KEYS }}" -eq "") { exit 0 }

          $b64 = [Convert]::ToBase64String(
            [Text.Encoding]::ASCII.GetBytes(
              "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
            )
          )
          $headers = @{
            Authorization  = "Basic $b64"
            "Content-Type" = "application/json"
          }

          $keys    = "${{ steps.merge-keys.outputs.ALL_KEYS }}" -split ","
          $baseUrl = "${{ secrets.JIRA_BASE_URL }}"
          $tag     = "${{ inputs.tag }}"
          $comment = "${{ inputs.comment }}"

          foreach ($key in $keys) {
            $key = $key.Trim()
            if ($key -eq "") { continue }

            $body = @{
              body = @{
                type    = "doc"
                version = 1
                content = @(@{
                  type    = "paragraph"
                  content = @(@{
                    type = "text"
                    text = "[$tag] $comment"
                  })
                })
              }
            } | ConvertTo-Json -Depth 10

            try {
              Invoke-RestMethod `
                -Uri    "$baseUrl/rest/api/3/issue/$key/comment" `
                -Method POST `
                -Headers $headers `
                -Body   $body | Out-Null
              Write-Host "$key icin yorum eklendi."
            } catch {
              Write-Warning "$key icin yorum eklenemedi: $_"
            }
          }
        shell: powershell

      # 7. Teams bildirimi
      - name: Teams bildirimi
        run: |
          $transitionTo = "${{ inputs.transition_to }}"
          $statusLabel  = ""

          if ($transitionTo -eq "WAITING QA")              { $statusLabel = "[QA Bekleniyor]" }
          elseif ($transitionTo -eq "WAITING TEST DEPLOY") { $statusLabel = "[Test Deploy Bekleniyor]" }
          elseif ($transitionTo -eq "WAITING ACCEPTANCE")  { $statusLabel = "[Acceptance Bekleniyor]" }
          elseif ($transitionTo -eq "DONE")                { $statusLabel = "[Tamamlandi]" }
          else                                             { $statusLabel = "[Bilgi]" }

          $keys = "${{ steps.merge-keys.outputs.ALL_KEYS }}"
          $tag  = "${{ inputs.tag }}"

          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "$statusLabel Jira Durum Guncellendi"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag       : $tag" }
                  @{ type = "TextBlock"; text = "Yeni durum: $transitionTo" }
                  @{ type = "TextBlock"; text = "Issue'lar : $keys" }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell
