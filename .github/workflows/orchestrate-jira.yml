name: Orchestrate Jira

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (örn: release/v1.4)"
        required: true
        type: string
      transition_to:
        description: "Geçilecek Jira durumu"
        required: true
        type: choice
        options:
          - WAITING QA
          - WAITING TEST DEPLOY
          - WAITING ACCEPTANCE
          - DONE
      comment:
        description: "Jira issue'larına eklenecek yorum (opsiyonel)"
        required: false
        type: string

jobs:
  jira-transition:
    name: Jira durum geçişi
    runs-on: self-hosted

    steps:
      # 1. Backend commit'lerinden issue key'leri topla
      - name: Issue key'leri topla (backend)
        id: backend-keys
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:RELEASE_PAT"
            Accept        = "application/vnd.github+json"
          }

          $commitsUrl = "https://api.github.com/repos/${{ vars.BACKEND_REPO }}/commits?sha=${{ inputs.tag }}&per_page=50"
          $commits    = Invoke-RestMethod -Uri $commitsUrl -Headers $headers

          $pattern = "${{ vars.JIRA_PROJECT_KEY }}-\d+"
          $keys    = @()

          foreach ($commit in $commits) {
            $msg         = $commit.commit.message
            $foundKeys   = [regex]::Matches($msg, $pattern)
            foreach ($m in $foundKeys) {
              if ($keys -notcontains $m.Value) {
                $keys += $m.Value
              }
            }
          }

          $keyList = $keys -join ","
          Write-Host "Backend issue key'leri: $keyList"
          echo "BACKEND_KEYS=$keyList" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 2. Frontend commit'lerinden issue key'leri topla
      - name: Issue key'leri topla (frontend)
        id: frontend-keys
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:RELEASE_PAT"
            Accept        = "application/vnd.github+json"
          }

          $commitsUrl = "https://api.github.com/repos/${{ vars.FRONTEND_REPO }}/commits?sha=${{ inputs.tag }}&per_page=50"
          $commits    = Invoke-RestMethod -Uri $commitsUrl -Headers $headers

          $pattern = "${{ vars.JIRA_PROJECT_KEY }}-\d+"
          $keys    = @()

          foreach ($commit in $commits) {
            $msg         = $commit.commit.message
            $foundKeys   = [regex]::Matches($msg, $pattern)
            foreach ($m in $foundKeys) {
              if ($keys -notcontains $m.Value) {
                $keys += $m.Value
              }
            }
          }

          $keyList = $keys -join ","
          Write-Host "Frontend issue key'leri: $keyList"
          echo "FRONTEND_KEYS=$keyList" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 3. Key listelerini birlestir
      - name: Key listelerini birleştir
        id: merge-keys
        run: |
          $backendKeys  = "${{ steps.backend-keys.outputs.BACKEND_KEYS }}"  -split "," | Where-Object { $_ -ne "" }
          $frontendKeys = "${{ steps.frontend-keys.outputs.FRONTEND_KEYS }}" -split "," | Where-Object { $_ -ne "" }
          $allKeys      = ($backendKeys + $frontendKeys) | Sort-Object -Unique

          if ($allKeys.Count -eq 0) {
            Write-Warning "Hicbir Jira issue key bulunamadi. Commit mesajlarinda '${{ vars.JIRA_PROJECT_KEY }}-XXXX' formati arandi."
            echo "ALL_KEYS=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $keyList = $allKeys -join ","
          Write-Host "Toplam issue key'ler: $keyList"
          echo "ALL_KEYS=$keyList" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 4. Jira durum gecisi
      - name: Jira durum geçişi yap
        run: |
          if ("${{ steps.merge-keys.outputs.ALL_KEYS }}" -eq "") {
            Write-Warning "Issue key bulunamadigi icin Jira gecisi atlanıyor."
            exit 0
          }

          $b64 = [Convert]::ToBase64String(
            [Text.Encoding]::ASCII.GetBytes(
              "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
            )
          )
          $headers = @{
            Authorization  = "Basic $b64"
            "Content-Type" = "application/json"
            Accept         = "application/json"
          }

          $targetStatus = "${{ inputs.transition_to }}"
          $keys         = "${{ steps.merge-keys.outputs.ALL_KEYS }}" -split ","
          $baseUrl      = "${{ secrets.JIRA_BASE_URL }}"
          $failed       = @()

          foreach ($key in $keys) {
            $key = $key.Trim()
            if ($key -eq "") { continue }
            Write-Host "--- $key isleniyor ---"

            try {
              $transUrl  = "$baseUrl/rest/api/3/issue/$key/transitions"
              $transResp = Invoke-RestMethod -Uri $transUrl -Headers $headers

              Write-Host "Mevcut transition'lar: $($transResp.transitions.name -join ', ')"

              # Buyuk/kucuk harf ve Turkce karakter duyarsiz eslesme
              $transition = $transResp.transitions | Where-Object {
                $_.name.ToUpper() -eq $targetStatus.ToUpper() -or
                $_.name -replace "I","i" -replace "İ","i" -replace "ı","i" `
                  -eq ($targetStatus -replace "I","i" -replace "İ","i" -replace "ı","i")
              } | Select-Object -First 1

              if (-not $transition) {
                Write-Warning "$key icin '$targetStatus' transition bulunamadi."
                $failed += $key
                continue
              }

              $body = @{ transition = @{ id = $transition.id } } | ConvertTo-Json
              Invoke-RestMethod `
                -Uri    $transUrl `
                -Method POST `
                -Headers $headers `
                -Body   $body | Out-Null

              Write-Host "$key gecisi yapildi: $($transition.name)"

            } catch {
              Write-Warning "$key icin gecis basarisiz: $_"
              $failed += $key
            }
          }

          if ($failed.Count -gt 0) {
            Write-Warning "Gecis yapilamayan issue'lar: $($failed -join ', ')"
          }
        shell: powershell

      # 5. Yorum ekle
      - name: Jira issue'larına yorum ekle
        if: inputs.comment != ''
        run: |
          if ("${{ steps.merge-keys.outputs.ALL_KEYS }}" -eq "") { exit 0 }

          $b64 = [Convert]::ToBase64String(
            [Text.Encoding]::ASCII.GetBytes(
              "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
            )
          )
          $headers = @{
            Authorization  = "Basic $b64"
            "Content-Type" = "application/json"
          }

          $keys    = "${{ steps.merge-keys.outputs.ALL_KEYS }}" -split ","
          $baseUrl = "${{ secrets.JIRA_BASE_URL }}"
          $tag     = "${{ inputs.tag }}"
          $comment = "${{ inputs.comment }}"

          foreach ($key in $keys) {
            $key = $key.Trim()
            if ($key -eq "") { continue }

            $body = @{
              body = @{
                type    = "doc"
                version = 1
                content = @(@{
                  type    = "paragraph"
                  content = @(@{
                    type = "text"
                    text = "[$tag] $comment"
                  })
                })
              }
            } | ConvertTo-Json -Depth 10

            try {
              Invoke-RestMethod `
                -Uri    "$baseUrl/rest/api/3/issue/$key/comment" `
                -Method POST `
                -Headers $headers `
                -Body   $body | Out-Null
              Write-Host "$key icin yorum eklendi."
            } catch {
              Write-Warning "$key icin yorum eklenemedi: $_"
            }
          }
        shell: powershell

      # 6. Teams bildirimi (emoji yerine metin etiketi)
      - name: Teams bildirimi
        run: |
          $transitionTo = "${{ inputs.transition_to }}"
          $statusLabel  = ""

          if ($transitionTo -eq "WAITING QA")           { $statusLabel = "[QA Bekleniyor]" }
          elseif ($transitionTo -eq "WAITING TEST DEPLOY")  { $statusLabel = "[Test Deploy Bekleniyor]" }
          elseif ($transitionTo -eq "WAITING ACCEPTANCE")   { $statusLabel = "[Acceptance Bekleniyor]" }
          elseif ($transitionTo -eq "DONE")                 { $statusLabel = "[Tamamlandi]" }
          else                                              { $statusLabel = "[Bilgi]" }

          $keys = "${{ steps.merge-keys.outputs.ALL_KEYS }}"
          $tag  = "${{ inputs.tag }}"

          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "$statusLabel Jira Durum Guncellendi"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag       : $tag" }
                  @{ type = "TextBlock"; text = "Yeni durum: $transitionTo" }
                  @{ type = "TextBlock"; text = "Issue'lar : $keys" }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell
