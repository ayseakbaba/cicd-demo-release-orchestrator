name: Orchestrate Test Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (örn: release/v1.4)"
        required: true
        type: string
      release_type:
        description: "Release tipi"
        required: true
        type: choice
        options:
          - normal
          - hotfix

jobs:
  deploy-test:
    name: Test ortamina deploy
    runs-on: self-hosted

    steps:
      # 1. Checkout orchestrator
      - name: Checkout orchestrator
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          token: ${{ secrets.RELEASE_PAT }}

      # 2. Changelog olustur
      - name: Changelog olustur
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $tag     = "${{ inputs.tag }}"
          $headers = @{
            Authorization = "Bearer $env:RELEASE_PAT"
            Accept        = "application/vnd.github+json"
          }

          # Backend reposundan onceki tag'i bul
          $tagsUrl = "https://api.github.com/repos/${{ vars.BACKEND_REPO }}/git/refs/tags"
          try {
            $response = Invoke-RestMethod -Uri $tagsUrl -Headers $headers -Method GET
          } catch {
            $response = @()
          }

          $tagPattern  = "^refs/tags/release/v(\d+)\.(\d+)(?:\.(\d+))?$"
          $releaseTags = @(
            $response | Where-Object { $_.ref -match $tagPattern } |
            ForEach-Object {
              $null = $_.ref -match $tagPattern
              [PSCustomObject]@{
                Ref   = $_.ref -replace "refs/tags/", ""
                Major = [int]$Matches[1]
                Minor = [int]$Matches[2]
                Patch = if ($Matches[3]) { [int]$Matches[3] } else { 0 }
              }
            } | Sort-Object Major, Minor, Patch
          )

          $currentIndex = -1
          for ($i = 0; $i -lt $releaseTags.Count; $i++) {
            if ($releaseTags[$i].Ref -eq $tag) { $currentIndex = $i; break }
          }

          $previousTag = if ($currentIndex -gt 0) { $releaseTags[$currentIndex - 1].Ref } else { $null }

          Write-Host "Mevcut tag : $tag"
          Write-Host "Onceki tag : $previousTag"

          $allChanges = @()
          $date       = Get-Date -Format "yyyy-MM-dd HH:mm"

          foreach ($repo in @("${{ vars.BACKEND_REPO }}", "${{ vars.FRONTEND_REPO }}")) {
            $repoShort  = $repo -replace ".*/", ""
            $commitsUrl = if ($previousTag) {
              "https://api.github.com/repos/$repo/compare/$previousTag...$tag"
            } else {
              "https://api.github.com/repos/$repo/commits?sha=$tag&per_page=50"
            }

            try {
              $result  = Invoke-RestMethod -Uri $commitsUrl -Headers $headers
              $commits = if ($previousTag) { $result.commits } else { $result }

              foreach ($commit in $commits) {
                $msg = $commit.commit.message -split "`n" | Select-Object -First 1
                $sha = $commit.sha.Substring(0, 7)
                $allChanges += "- [$repoShort] $msg ($sha)"
              }
            } catch {
              Write-Warning "$repo commit listesi alinamadi: $_"
            }
          }

          $changelogPath = "CHANGELOG.md"
          $changeLines   = $allChanges -join [System.Environment]::NewLine
          $newEntry      = "## $tag -- $date" + [System.Environment]::NewLine +
                           $changeLines + [System.Environment]::NewLine +
                           [System.Environment]::NewLine

          if (Test-Path $changelogPath) {
            $existing = Get-Content $changelogPath -Raw
            ($newEntry + $existing) | Set-Content $changelogPath -Encoding UTF8
          } else {
            ("# Changelog" + [System.Environment]::NewLine + [System.Environment]::NewLine + $newEntry) |
              Set-Content $changelogPath -Encoding UTF8
          }

          Write-Host "Changelog olusturuldu."

          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          git add CHANGELOG.md
          git commit -m "chore: changelog guncellendi ($tag)"
          git push
        shell: powershell

      # 3. Artifact'leri indir
      - name: Artifact'leri indir
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE "scripts\download-artifacts.ps1"
          & $scriptPath `
            -Tag          "${{ inputs.tag }}" `
            -BackendRepo  "${{ vars.BACKEND_REPO }}" `
            -FrontendRepo "${{ vars.FRONTEND_REPO }}" `
            -OutputPath   "C:\actions-runner\artifacts"
        shell: powershell

      # 4. IIS test bekleme slotunu durdur
      - name: IIS test bekleme slotu durdur
        run: |
          Import-Module WebAdministration
          
          $site    = "${{ vars.IIS_TEST_STAGING_SITE }}"
          $apiSite = "${{ vars.IIS_TEST_STAGING_SITE }}-API"
          
          $pool    = (Get-Website -Name $site).applicationPool
          $apiPool = (Get-Website -Name $apiSite).applicationPool
          
          Stop-WebSite    -Name $site    -ErrorAction SilentlyContinue
          Stop-WebSite    -Name $apiSite -ErrorAction SilentlyContinue
          
          Stop-WebAppPool -Name $pool    -ErrorAction SilentlyContinue
          Stop-WebAppPool -Name $apiPool -ErrorAction SilentlyContinue
          
          Start-Sleep -Seconds 3
          Write-Host "Test bekleme slotu durduruldu."
        shell: powershell

      # 5. Backend deploy
      - name: Backend deploy
        run: |
          $safeTag = "${{ inputs.tag }}" -replace "/", "-"
          $src     = "C:\actions-runner\artifacts\backend\backend-$safeTag"
          $dest    = "${{ vars.IIS_TEST_STAGING_BACKEND_PATH }}"

          Write-Host "Kaynak : $src"
          Write-Host "Hedef  : $dest"

          if (!(Test-Path $src)) { throw "Artifact bulunamadi: $src" }
          if (Test-Path $dest)   { Remove-Item "$dest\*" -Recurse -Force }

          Copy-Item "$src\*" -Destination $dest -Recurse -Force
          Write-Host "Backend test bekleme slotuna deploy edildi."
        shell: powershell

      # 6. Frontend deploy
      - name: Frontend deploy
        run: |
          $safeTag = "${{ inputs.tag }}" -replace "/", "-"
          $src     = "C:\actions-runner\artifacts\frontend\frontend-$safeTag"
          $dest    = "${{ vars.IIS_TEST_STAGING_FRONTEND_PATH }}"

          Write-Host "Kaynak : $src"
          Write-Host "Hedef  : $dest"

          if (!(Test-Path $src)) { throw "Artifact bulunamadi: $src" }
          if (Test-Path $dest)   { Remove-Item "$dest\*" -Recurse -Force }

          Copy-Item "$src\*" -Destination $dest -Recurse -Force
          Write-Host "Frontend test bekleme slotuna deploy edildi."
        shell: powershell

      # 7. IIS test bekleme slotunu baslat
      - name: IIS test bekleme slotu baslat
        run: |
          Import-Module WebAdministration
          $site    = "${{ vars.IIS_TEST_STAGING_SITE }}"
          $apiSite = "${{ vars.IIS_TEST_STAGING_SITE }}-API"
          
          $pool    = (Get-Website -Name $site).applicationPool
          $apiPool = (Get-Website -Name $apiSite).applicationPool
          
          Start-WebAppPool -Name $apiPool -ErrorAction SilentlyContinue
          Start-WebAppPool -Name $pool    -ErrorAction SilentlyContinue
          Start-WebSite    -Name $apiSite
          Start-WebSite    -Name $site
          Write-Host "Test bekleme slotu baslatildi."
        shell: powershell

      # 8. Health check
      - name: Health check
        id: healthcheck
        run: |
          $url     = "${{ vars.IIS_TEST_STAGING_HEALTH_URL }}"
          $retries = 3
          $wait    = 15
          $success = $false

          for ($i = 1; $i -le $retries; $i++) {
            Write-Host "Health check denemesi $i/$retries - $url"
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check basarili."
                $success = $true
                break
              }
            } catch {
              Write-Host "Hata: $_"
            }
            if ($i -lt $retries) { Start-Sleep -Seconds $wait }
          }

          if (-not $success) {
            echo "HEALTH=failed" >> $env:GITHUB_OUTPUT
            exit 1
          }

          echo "HEALTH=ok" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 9. Rollback
      - name: Rollback (health check basarisiz)
        if: failure() && steps.healthcheck.outputs.HEALTH == 'failed'
        run: |
          Import-Module WebAdministration
          Stop-WebSite    -Name "${{ vars.IIS_TEST_STAGING_SITE }}"     -ErrorAction SilentlyContinue
          Stop-WebSite    -Name "${{ vars.IIS_TEST_STAGING_SITE }}-API" -ErrorAction SilentlyContinue
          Stop-WebAppPool -Name "${{ vars.IIS_TEST_STAGING_SITE }}"     -ErrorAction SilentlyContinue
          Stop-WebAppPool -Name "${{ vars.IIS_TEST_STAGING_SITE }}-API" -ErrorAction SilentlyContinue

          Remove-Item "${{ vars.IIS_TEST_STAGING_BACKEND_PATH }}\*"  -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ vars.IIS_TEST_STAGING_FRONTEND_PATH }}\*" -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Rollback tamamlandi. Test aktif slotu etkilenmedi."
        shell: powershell

      # 10. Rollback Teams bildirimi
      - name: Teams bildirimi (rollback)
        if: failure()
        run: |
          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "Test Health Check Basarisiz - Rollback Yapildi"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: ${{ inputs.tag }}" }
                  @{ type = "TextBlock"; text = "Test aktif slotu etkilenmedi. Jira uzerinden retry yapabilirsiniz." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell

      # 11. Slot swap
      - name: Slot swap - Test aktif
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE "scripts\slot-swap.ps1"
          & $scriptPath `
            -ActiveSite          "${{ vars.IIS_TEST_ACTIVE_SITE }}" `
            -StagingSite         "${{ vars.IIS_TEST_STAGING_SITE }}" `
            -ActiveBackendPath   "${{ vars.IIS_TEST_ACTIVE_BACKEND_PATH }}" `
            -StagingBackendPath  "${{ vars.IIS_TEST_STAGING_BACKEND_PATH }}" `
            -ActiveFrontendPath  "${{ vars.IIS_TEST_ACTIVE_FRONTEND_PATH }}" `
            -StagingFrontendPath "${{ vars.IIS_TEST_STAGING_FRONTEND_PATH }}"
        shell: powershell

      # 12. Temizlik
      - name: Temizlik
        if: always()
        run: |
          $safeTag     = "${{ inputs.tag }}" -replace "/", "-"
          $backendArt  = "C:\actions-runner\artifacts\backend\backend-$safeTag"
          $frontendArt = "C:\actions-runner\artifacts\frontend\frontend-$safeTag"

          if (Test-Path $backendArt)  { Remove-Item -Recurse -Force $backendArt }
          if (Test-Path $frontendArt) { Remove-Item -Recurse -Force $frontendArt }

          Write-Host "Artifact temizlendi."
        shell: powershell

      # 13. Jira WAITING ACCEPTANCE + Teams bildirimi
      - name: Jira WAITING ACCEPTANCE + Teams bildirimi
        run: |
          $tag = "${{ inputs.tag }}"

          $body = @{
            ref    = "main"
            inputs = @{
              tag           = $tag
              transition_to = "WAITING ACCEPTANCE"
              comment       = "Test ortamina deploy tamamlandi. Acceptance incelemesi bekleniyor."
            }
          } | ConvertTo-Json

          Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/orchestrate-jira.yml/dispatches" `
            -Method POST `
            -Headers @{
              Authorization = "Bearer ${{ secrets.RELEASE_PAT }}"
              Accept        = "application/vnd.github+json"
            } `
            -Body $body `
            -ContentType "application/json"

          $teamsBody = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "Test Deploy Tamamlandi"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: $tag" }
                  @{ type = "TextBlock"; text = "Slot swap basarili. Test ortami aktif." }
                  @{ type = "TextBlock"; text = "Jira isleri WAITING ACCEPTANCE durumuna alindi." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $teamsBody `
            -ContentType "application/json"
        shell: powershell
