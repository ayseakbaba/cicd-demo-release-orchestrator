name: Orchestrate Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        type: string
      repo:
        description: "Sonucu bildiren repo"
        required: true
        type: choice
        options:
          - backend
          - frontend
      status:
        description: "Build sonucu"
        required: true
        type: choice
        options:
          - success
          - failure
          - promote   # hotfix: etkilenmeyen repo icin onceki artifact kullanilacak
      release_type:
        description: "Release tipi"
        required: true
        type: choice
        options:
          - normal
          - hotfix

jobs:
  # ---------------------------------------------------------------
  # JOB 1: Build sonucunu kaydet ve her iki sonuc geldiyse devam et
  # ---------------------------------------------------------------
  gate:
    name: Build gate kontrolü
    runs-on: self-hosted

    outputs:
      ready:         ${{ steps.check.outputs.READY }}
      backend_status: ${{ steps.check.outputs.BACKEND_STATUS }}
      frontend_status: ${{ steps.check.outputs.FRONTEND_STATUS }}
      has_failure:   ${{ steps.check.outputs.HAS_FAILURE }}

    steps:
      # 1. Gelen sonucu GitHub Actions cache'e kaydet
      - name: Build sonucunu kaydet
        run: |
          $tag         = "${{ inputs.tag }}" -replace "/", "_"
          $repo        = "${{ inputs.repo }}"
          $status      = "${{ inputs.status }}"
          $cacheDir    = "$env:RUNNER_TEMP\release-state\$tag"

          if (!(Test-Path $cacheDir)) {
            New-Item -ItemType Directory -Path $cacheDir | Out-Null
          }

          # repo bazinda sonucu dosyaya yaz
          $status | Out-File -FilePath "$cacheDir\$repo.txt" -Encoding utf8
          Write-Host "$repo sonucu kaydedildi: $status"
        shell: powershell

      # 2. Her iki repo sonucu geldiyse gate'i ac
      - name: Gate kontrolü
        id: check
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "_"
          $cacheDir = "$env:RUNNER_TEMP\release-state\$tag"

          $backendFile  = "$cacheDir\backend.txt"
          $frontendFile = "$cacheDir\frontend.txt"

          $backendReady  = Test-Path $backendFile
          $frontendReady = Test-Path $frontendFile

          if ($backendReady -and $frontendReady) {
            $backendStatus  = (Get-Content $backendFile).Trim()
            $frontendStatus = (Get-Content $frontendFile).Trim()

            Write-Host "Backend status : $backendStatus"
            Write-Host "Frontend status: $frontendStatus"

            $hasFailure = ($backendStatus -eq "failure" -or $frontendStatus -eq "failure")

            echo "READY=true"            >> $env:GITHUB_OUTPUT
            echo "BACKEND_STATUS=$backendStatus"   >> $env:GITHUB_OUTPUT
            echo "FRONTEND_STATUS=$frontendStatus" >> $env:GITHUB_OUTPUT
            echo "HAS_FAILURE=$($hasFailure.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Henuz her iki repo sonucu bekleniyor..."
            Write-Host "Backend hazir  : $backendReady"
            Write-Host "Frontend hazir : $frontendReady"
            echo "READY=false" >> $env:GITHUB_OUTPUT
          }
        shell: powershell

  # ---------------------------------------------------------------
  # JOB 2: Build hatasi varsa bildir ve dur
  # ---------------------------------------------------------------
  notify-failure:
    name: Build hatası bildirimi
    needs: gate
    runs-on: self-hosted
    if: needs.gate.outputs.ready == 'true' && needs.gate.outputs.has_failure == 'true'

    steps:
      - name: State dosyalarını temizle
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "_"
          $cacheDir = "$env:RUNNER_TEMP\release-state\$tag"
          if (Test-Path $cacheDir) {
            Remove-Item -Recurse -Force $cacheDir
          }
        shell: powershell

      - name: Teams bildirimi gonder (hata)
        run: |
          $backendStatus  = "${{ needs.gate.outputs.backend_status }}"
          $frontendStatus = "${{ needs.gate.outputs.frontend_status }}"
          $tag            = "${{ inputs.tag }}"

          $failedRepos = @()
          if ($backendStatus  -eq "failure") { $failedRepos += "Backend" }
          if ($frontendStatus -eq "failure") { $failedRepos += "Frontend" }
          $failedList = $failedRepos -join ", "

          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "❌ Build Başarısız"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: $tag" }
                  @{ type = "TextBlock"; text = "Başarısız: $failedList" }
                  @{ type = "TextBlock"; text = "Jira üzerinden 'Retry Release' butonu ile yeniden tetikleyebilirsiniz." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell

  # ---------------------------------------------------------------
  # JOB 3: Her iki build basariliysa deploy et
  # ---------------------------------------------------------------
  deploy-dev:
    name: IIS Dev deploy
    needs: gate
    runs-on: self-hosted
    if: needs.gate.outputs.ready == 'true' && needs.gate.outputs.has_failure == 'false'

    steps:
      # 1. Backend artifact'ini indir
      - name: Backend artifact indir
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ inputs.tag }}
          path: ${{ runner.temp }}\artifacts\backend
          github-token: ${{ secrets.RELEASE_PAT }}
          repository: ${{ vars.BACKEND_REPO }}

      # 2. Frontend artifact'ini indir
      - name: Frontend artifact indir
        uses: actions/download-artifact@v4
        with:
          name: frontend-${{ inputs.tag }}
          path: ${{ runner.temp }}\artifacts\frontend
          github-token: ${{ secrets.RELEASE_PAT }}
          repository: ${{ vars.FRONTEND_REPO }}

      # 3. IIS bekleme slotunu durdur
      - name: IIS bekleme slotu durdur
        run: |
          Import-Module WebAdministration
          Stop-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}"
          Write-Host "Bekleme slotu durduruldu: ${{ vars.IIS_DEV_STAGING_SITE }}"
        shell: powershell

      # 4. Backend deploy (bekleme slotuna)
      - name: Backend deploy → bekleme slotu
        run: |
          $src  = "${{ runner.temp }}\artifacts\backend"
          $dest = "${{ vars.IIS_DEV_STAGING_BACKEND_PATH }}"

          # Mevcut dosyaları temizle
          if (Test-Path $dest) {
            Remove-Item "$dest\*" -Recurse -Force
          }

          Copy-Item "$src\*" -Destination $dest -Recurse -Force
          Write-Host "Backend bekleme slotuna deploy edildi."
        shell: powershell

      # 5. Frontend deploy (bekleme slotuna)
      - name: Frontend deploy → bekleme slotu
        run: |
          $src  = "${{ runner.temp }}\artifacts\frontend"
          $dest = "${{ vars.IIS_DEV_STAGING_FRONTEND_PATH }}"

          if (Test-Path $dest) {
            Remove-Item "$dest\*" -Recurse -Force
          }

          Copy-Item "$src\*" -Destination $dest -Recurse -Force
          Write-Host "Frontend bekleme slotuna deploy edildi."
        shell: powershell

      # 6. IIS bekleme slotunu baslat
      - name: IIS bekleme slotu baslat
        run: |
          Import-Module WebAdministration
          Start-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}"
          Write-Host "Bekleme slotu baslatildi."
        shell: powershell

      # 7. Health check (3 kez dene, 15sn arayla)
      - name: Health check
        id: healthcheck
        run: |
          $url     = "${{ vars.IIS_DEV_STAGING_HEALTH_URL }}"
          $retries = 3
          $wait    = 15
          $success = $false

          for ($i = 1; $i -le $retries; $i++) {
            Write-Host "Health check denemesi $i/$retries - $url"
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check basarili."
                $success = $true
                break
              }
            } catch {
              Write-Host "Hata: $_"
            }
            if ($i -lt $retries) { Start-Sleep -Seconds $wait }
          }

          if (-not $success) {
            Write-Host "Health check basarisiz oldu."
            echo "HEALTH=failed" >> $env:GITHUB_OUTPUT
            exit 1
          }

          echo "HEALTH=ok" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 8. Health check basarisizsa rollback
      - name: Rollback (health check basarisiz)
        if: failure() && steps.healthcheck.outputs.HEALTH == 'failed'
        run: |
          Import-Module WebAdministration
          Stop-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}"

          # Bekleme slotu dosyalarini temizle
          Remove-Item "${{ vars.IIS_DEV_STAGING_BACKEND_PATH }}\*"  -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ vars.IIS_DEV_STAGING_FRONTEND_PATH }}\*" -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Rollback tamamlandi. Aktif slot etkilenmedi."
        shell: powershell

      # 9. Rollback sonrasi Teams bildirimi
      - name: Teams bildirimi (rollback)
        if: failure()
        run: |
          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "⚠️ Health Check Başarısız — Rollback Yapıldı"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: ${{ inputs.tag }}" }
                  @{ type = "TextBlock"; text = "Aktif slot etkilenmedi. Jira üzerinden 'Retry Release' ile yeniden deneyebilirsiniz." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell

      # 10. Slot swap (health check OK)
      - name: Slot swap → Dev aktif
        run: |
          Import-Module WebAdministration

          # Aktif slotu durdur
          Stop-WebSite -Name "${{ vars.IIS_DEV_ACTIVE_SITE }}"

          # Bekleme → Aktif olarak yeniden adlandir (path swap)
          $activeBE   = "${{ vars.IIS_DEV_ACTIVE_BACKEND_PATH }}"
          $stagingBE  = "${{ vars.IIS_DEV_STAGING_BACKEND_PATH }}"
          $activeFE   = "${{ vars.IIS_DEV_ACTIVE_FRONTEND_PATH }}"
          $stagingFE  = "${{ vars.IIS_DEV_STAGING_FRONTEND_PATH }}"
          $tempBE     = "$activeBE`_temp"
          $tempFE     = "$activeFE`_temp"

          # Backend swap
          Rename-Item $activeBE  $tempBE
          Rename-Item $stagingBE $activeBE
          Rename-Item $tempBE    $stagingBE

          # Frontend swap
          Rename-Item $activeFE  $tempFE
          Rename-Item $stagingFE $activeFE
          Rename-Item $tempFE    $stagingFE

          # Aktif slotu baslat
          Start-WebSite -Name "${{ vars.IIS_DEV_ACTIVE_SITE }}"
          Write-Host "Slot swap tamamlandi. Yeni versiyon aktif."
        shell: powershell

      # 11. State dosyalarini temizle
      - name: State dosyalarini temizle
        if: always()
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "_"
          $cacheDir = "$env:RUNNER_TEMP\release-state\$tag"
          if (Test-Path $cacheDir) {
            Remove-Item -Recurse -Force $cacheDir
          }
        shell: powershell

      # 12. Jira ve Teams bildirimi (basari)
      - name: Jira Waiting QA + Teams bildirimi
        run: |
          $tag = "${{ inputs.tag }}"

          # Teams bildirimi
          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "✅ Dev Deploy Tamamlandı"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: $tag" }
                  @{ type = "TextBlock"; text = "Slot swap basarili. Jira'da ilgili isler Waiting QA durumuna alindi." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"

          # Jira durum gecisi: Waiting QA
          # Not: Jira issue key'leri commit mesajlarindan toplanip
          # Jira REST API uzerinden transition yapilacak.
          # Bu adim orchestrate-jira.yml'de ayri yonetilecek.
          Write-Host "Jira gecisi orchestrate-jira workflow'u tarafindan yapilacak."
        shell: powershell
