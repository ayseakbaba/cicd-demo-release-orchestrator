name: Orchestrate Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        type: string
      repo:
        description: "Sonucu bildiren repo"
        required: true
        type: choice
        options:
          - backend
          - frontend
      status:
        description: "Build sonucu"
        required: true
        type: choice
        options:
          - success
          - failure
          - promote
      release_type:
        description: "Release tipi"
        required: true
        type: choice
        options:
          - normal
          - hotfix

jobs:
  # ---------------------------------------------------------------
  # JOB 1: Build sonucunu kaydet ve her iki sonuc geldiyse devam et
  # ---------------------------------------------------------------
  gate:
    name: Build gate kontrolü
    runs-on: self-hosted

    outputs:
      ready:           ${{ steps.check.outputs.READY }}
      backend_status:  ${{ steps.check.outputs.BACKEND_STATUS }}
      frontend_status: ${{ steps.check.outputs.FRONTEND_STATUS }}
      has_failure:     ${{ steps.check.outputs.HAS_FAILURE }}

    steps:
      - name: Build sonucunu kaydet
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "-" -replace "\.", "-"
          $repo     = "${{ inputs.repo }}"
          $status   = "${{ inputs.status }}"
          $stateDir = "C:\actions-runner\release-state\$tag"

          if (!(Test-Path $stateDir)) {
            New-Item -ItemType Directory -Path $stateDir -Force | Out-Null
          }

          $status | Out-File -FilePath "$stateDir\$repo.txt" -Encoding utf8 -Force
          Write-Host "$repo sonucu kaydedildi: $status"
          Write-Host "Klasor: $stateDir"
        shell: powershell

      - name: Gate kontrolü
        id: check
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "-" -replace "\.", "-"
          $stateDir = "C:\actions-runner\release-state\$tag"

          $backendFile  = "$stateDir\backend.txt"
          $frontendFile = "$stateDir\frontend.txt"

          $backendReady  = Test-Path $backendFile
          $frontendReady = Test-Path $frontendFile

          Write-Host "State klasoru : $stateDir"
          Write-Host "Backend hazir : $backendReady"
          Write-Host "Frontend hazir: $frontendReady"

          if ($backendReady -and $frontendReady) {
            $backendStatus  = (Get-Content $backendFile).Trim()
            $frontendStatus = (Get-Content $frontendFile).Trim()

            Write-Host "Backend status : $backendStatus"
            Write-Host "Frontend status: $frontendStatus"

            $hasFailure = ($backendStatus -eq "failure" -or $frontendStatus -eq "failure")

            echo "READY=true"                                        >> $env:GITHUB_OUTPUT
            echo "BACKEND_STATUS=$backendStatus"                    >> $env:GITHUB_OUTPUT
            echo "FRONTEND_STATUS=$frontendStatus"                  >> $env:GITHUB_OUTPUT
            echo "HAS_FAILURE=$($hasFailure.ToString().ToLower())"  >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Henuz her iki repo sonucu bekleniyor..."
            echo "READY=false" >> $env:GITHUB_OUTPUT
          }
        shell: powershell

  # ---------------------------------------------------------------
  # JOB 2: Build hatasi varsa bildir ve dur
  # ---------------------------------------------------------------
  notify-failure:
    name: Build hatası bildirimi
    needs: gate
    runs-on: self-hosted
    if: needs.gate.outputs.ready == 'true' && needs.gate.outputs.has_failure == 'true'

    steps:
      - name: State dosyalarini temizle
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "-" -replace "\.", "-"
          $stateDir = "C:\actions-runner\release-state\$tag"
          if (Test-Path $stateDir) {
            Remove-Item -Recurse -Force $stateDir
          }
        shell: powershell

      - name: Teams bildirimi (hata)
        run: |
          $backendStatus  = "${{ needs.gate.outputs.backend_status }}"
          $frontendStatus = "${{ needs.gate.outputs.frontend_status }}"
          $tag            = "${{ inputs.tag }}"

          $failedRepos = @()
          if ($backendStatus  -eq "failure") { $failedRepos += "Backend" }
          if ($frontendStatus -eq "failure") { $failedRepos += "Frontend" }
          $failedList = $failedRepos -join ", "

          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "Build Basarisiz"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: $tag" }
                  @{ type = "TextBlock"; text = "Basarisiz: $failedList" }
                  @{ type = "TextBlock"; text = "Jira uzerinden Retry Release butonu ile yeniden tetikleyebilirsiniz." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell

  # ---------------------------------------------------------------
  # JOB 3: Her iki build basariliysa deploy et
  # ---------------------------------------------------------------
  deploy-dev:
    name: IIS Dev deploy
    needs: gate
    runs-on: self-hosted
    if: needs.gate.outputs.ready == 'true' && needs.gate.outputs.has_failure == 'false'

    steps:
      # 1. Orchestrator checkout (download script icin)
      - name: Checkout orchestrator
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      # 2. Artifact'leri kalici klasore indir
      - name: Artifact'leri indir
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE "scripts\download-artifacts.ps1"
          & $scriptPath `
            -Tag          "${{ inputs.tag }}" `
            -BackendRepo  "${{ vars.BACKEND_REPO }}" `
            -FrontendRepo "${{ vars.FRONTEND_REPO }}" `
            -OutputPath   "C:\actions-runner\artifacts"
        shell: powershell

      # 3. IIS bekleme slotunu durdur
      - name: IIS bekleme slotu durdur
        run: |
          Import-Module WebAdministration
          Stop-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}"     -ErrorAction SilentlyContinue
          Stop-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}-API" -ErrorAction SilentlyContinue
          Write-Host "Bekleme slotu durduruldu."
        shell: powershell

      # 4. Backend deploy
      - name: Backend deploy
        run: |
          $safeTag = "${{ inputs.tag }}" -replace "/", "-"
          $src     = "C:\actions-runner\artifacts\backend\backend-$safeTag"
          $dest    = "${{ vars.IIS_DEV_STAGING_BACKEND_PATH }}"

          Write-Host "Kaynak : $src"
          Write-Host "Hedef  : $dest"

          if (!(Test-Path $src)) {
            throw "Artifact klasoru bulunamadi: $src"
          }

          if (Test-Path $dest) {
            Remove-Item "$dest\*" -Recurse -Force
          }

          Copy-Item "$src\*" -Destination $dest -Recurse -Force
          Write-Host "Backend bekleme slotuna deploy edildi."
        shell: powershell

      # 5. Frontend deploy
      - name: Frontend deploy
        run: |
          $safeTag = "${{ inputs.tag }}" -replace "/", "-"
          $src     = "C:\actions-runner\artifacts\frontend\frontend-$safeTag"
          $dest    = "${{ vars.IIS_DEV_STAGING_FRONTEND_PATH }}"

          Write-Host "Kaynak : $src"
          Write-Host "Hedef  : $dest"

          if (!(Test-Path $src)) {
            throw "Artifact klasoru bulunamadi: $src"
          }

          if (Test-Path $dest) {
            Remove-Item "$dest\*" -Recurse -Force
          }

          Copy-Item "$src\*" -Destination $dest -Recurse -Force
          Write-Host "Frontend bekleme slotuna deploy edildi."
        shell: powershell

      # 6. IIS bekleme slotunu baslat
      - name: IIS bekleme slotu baslat
        run: |
          Import-Module WebAdministration
          Start-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}-API"
          Start-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}"
          Write-Host "Bekleme slotu baslatildi."
        shell: powershell

      # 7. Health check
      - name: Health check
        id: healthcheck
        run: |
          $url     = "${{ vars.IIS_DEV_STAGING_HEALTH_URL }}"
          $retries = 3
          $wait    = 15
          $success = $false

          for ($i = 1; $i -le $retries; $i++) {
            Write-Host "Health check denemesi $i/$retries - $url"
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check basarili."
                $success = $true
                break
              }
            } catch {
              Write-Host "Hata: $_"
            }
            if ($i -lt $retries) { Start-Sleep -Seconds $wait }
          }

          if (-not $success) {
            Write-Host "Health check basarisiz oldu."
            echo "HEALTH=failed" >> $env:GITHUB_OUTPUT
            exit 1
          }

          echo "HEALTH=ok" >> $env:GITHUB_OUTPUT
        shell: powershell

      # 8. Rollback
      - name: Rollback (health check basarisiz)
        if: failure() && steps.healthcheck.outputs.HEALTH == 'failed'
        run: |
          Import-Module WebAdministration
          Stop-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}"     -ErrorAction SilentlyContinue
          Stop-WebSite -Name "${{ vars.IIS_DEV_STAGING_SITE }}-API" -ErrorAction SilentlyContinue

          Remove-Item "${{ vars.IIS_DEV_STAGING_BACKEND_PATH }}\*"  -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ vars.IIS_DEV_STAGING_FRONTEND_PATH }}\*" -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Rollback tamamlandi. Aktif slot etkilenmedi."
        shell: powershell

      # 9. Rollback Teams bildirimi
      - name: Teams bildirimi (rollback)
        if: failure()
        run: |
          $body = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "Health Check Basarisiz - Rollback Yapildi"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: ${{ inputs.tag }}" }
                  @{ type = "TextBlock"; text = "Aktif slot etkilenmedi. Jira uzerinden Retry Release ile yeniden deneyebilirsiniz." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $body `
            -ContentType "application/json"
        shell: powershell

      # 10. Slot swap
      - name: Slot swap - Dev aktif
        run: |
          Import-Module WebAdministration

          Stop-WebSite -Name "${{ vars.IIS_DEV_ACTIVE_SITE }}"     -ErrorAction SilentlyContinue
          Stop-WebSite -Name "${{ vars.IIS_DEV_ACTIVE_SITE }}-API" -ErrorAction SilentlyContinue

          $activeBE  = "${{ vars.IIS_DEV_ACTIVE_BACKEND_PATH }}"
          $stagingBE = "${{ vars.IIS_DEV_STAGING_BACKEND_PATH }}"
          $activeFE  = "${{ vars.IIS_DEV_ACTIVE_FRONTEND_PATH }}"
          $stagingFE = "${{ vars.IIS_DEV_STAGING_FRONTEND_PATH }}"

          $tempBE = "$activeBE`_temp"
          Rename-Item $activeBE  $tempBE
          Rename-Item $stagingBE $activeBE
          Rename-Item $tempBE    $stagingBE

          $tempFE = "$activeFE`_temp"
          Rename-Item $activeFE  $tempFE
          Rename-Item $stagingFE $activeFE
          Rename-Item $tempFE    $stagingFE

          Start-WebSite -Name "${{ vars.IIS_DEV_ACTIVE_SITE }}-API"
          Start-WebSite -Name "${{ vars.IIS_DEV_ACTIVE_SITE }}"

          Write-Host "Slot swap tamamlandi. Yeni versiyon aktif."
        shell: powershell

      # 11. Temizlik
      - name: Temizlik
        if: always()
        run: |
          $tag      = "${{ inputs.tag }}" -replace "/", "-" -replace "\.", "-"
          $safeTag  = "${{ inputs.tag }}" -replace "/", "-"
          $stateDir = "C:\actions-runner\release-state\$tag"

          # State dosyalarini temizle
          if (Test-Path $stateDir) {
            Remove-Item -Recurse -Force $stateDir
            Write-Host "State temizlendi."
          }

          # Artifact dosyalarini temizle
          $backendArt  = "C:\actions-runner\artifacts\backend\backend-$safeTag"
          $frontendArt = "C:\actions-runner\artifacts\frontend\frontend-$safeTag"

          if (Test-Path $backendArt)  { Remove-Item -Recurse -Force $backendArt }
          if (Test-Path $frontendArt) { Remove-Item -Recurse -Force $frontendArt }

          Write-Host "Artifact temizlendi."
        shell: powershell

      # 12. Jira WAITING QA + Teams bildirimi
      - name: Jira WAITING QA + Teams bildirimi
        run: |
          $tag = "${{ inputs.tag }}"

          # Jira gecisi
          $body = @{
            ref    = "main"
            inputs = @{
              tag           = $tag
              transition_to = "WAITING QA"
              comment       = "Dev deploy tamamlandi. Slot swap basarili. QA incelemesi bekleniyor."
            }
          } | ConvertTo-Json

          Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/orchestrate-jira.yml/dispatches" `
            -Method POST `
            -Headers @{
              Authorization = "Bearer ${{ secrets.RELEASE_PAT }}"
              Accept        = "application/vnd.github+json"
            } `
            -Body $body `
            -ContentType "application/json"

          # Teams bildirimi
          $teamsBody = @{
            type        = "message"
            attachments = @(@{
              contentType = "application/vnd.microsoft.card.adaptive"
              content     = @{
                type    = "AdaptiveCard"
                version = "1.4"
                body    = @(
                  @{ type = "TextBlock"; text = "Dev Deploy Tamamlandi"; weight = "Bolder"; size = "Medium" }
                  @{ type = "TextBlock"; text = "Tag: $tag" }
                  @{ type = "TextBlock"; text = "Slot swap basarili. Jira isleri WAITING QA durumuna alindi." }
                )
              }
            })
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri "${{ secrets.TEAMS_WEBHOOK_URL }}" `
            -Method POST `
            -Body $teamsBody `
            -ContentType "application/json"
        shell: powershell
